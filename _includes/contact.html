  <!-- SECTION 4: Contact-->
<section id="contact" class="contact-section">
    <h2>Contact</h2>

    <div class="group">
      
        <form action="https://formspree.io/f/{{site.formspree-key}}" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" style="color: --text-color;">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" style="color: --text-color;">

            <label for="message">Message</label>
            <textarea id="message" cols = "30" rows="10" name="message" style="color: --text-color;"></textarea>

            <button type="submit" style="background-color: --text-color; color: --border-color;">Send Message</button>
        </form>
    </div>
  </section>
