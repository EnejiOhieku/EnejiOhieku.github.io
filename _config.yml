# Main Page Setup

title: Eneji Ohieku's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Eneji Peacemaker Ohieku
headline: Roboticist | ML Engineer | Backend Developer | Competitive Programmer (Math & DSA sports)
description: >- # dont remove this line. this will ignore all new lines until the next section
  I am a Roboticist with a unique full-stack foundation that spans from junior school coding to professional development.
  A self-taught programmer starting with Python game development and backend systems, later mastering C++ through extensive reading (I love books) and embedded systems work. 
  Currently pursuing B.Eng. in Mechatronics Engineering while actively working with ROS, OpenCV, TensorFlow, and hardware prototyping. 
  Combines strong mathematical problem-solving and DSA to tackle tough algorithimic problems.
  Also have practical skills in mechanical CAD, electronics design and low-level firmware development. 
  This blend of deep technical breadth from high-level AI down to bare-metal embedded systems, 
  enables me to design and implement end-to-end robotic systems.



